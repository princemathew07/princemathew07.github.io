<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Abstract illustration of active learning for pushdown systems</title>
  <desc id="desc">A learner receives membership, stack, and equivalence information from a gray black-box pushdown system and constructs a hypothesis automaton.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.52" stop-color="#eef7fb"/>
      <stop offset="1" stop-color="#f6f2e9"/>
    </linearGradient>
    <linearGradient id="learner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b9be1"/>
      <stop offset="1" stop-color="#1865ba"/>
    </linearGradient>
    <linearGradient id="hypothesis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37b8a7"/>
      <stop offset="1" stop-color="#176f7e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#16344f" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#1865ba"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#176f7e"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#c97824"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#566b83"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <path d="M90 465 C230 350 345 465 475 350 C635 205 805 315 1090 160" fill="none" stroke="#d8e7f0" stroke-width="38" stroke-linecap="round" opacity="0.72"/>
  <path d="M155 132 C300 75 415 170 585 118 C750 70 880 112 1015 82" fill="none" stroke="#efd7a1" stroke-width="24" stroke-linecap="round" opacity="0.42"/>

  <g filter="url(#softShadow)">
    <circle cx="225" cy="245" r="108" fill="url(#learner)"/>
    <circle cx="225" cy="245" r="74" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.72"/>
    <circle cx="225" cy="245" r="34" fill="#ffffff" opacity="0.96"/>
    <path d="M204 245 h42 M225 224 v42" stroke="#1865ba" stroke-width="7" stroke-linecap="round"/>
    <text x="170" y="392" font-family="Roboto, Arial, sans-serif" font-size="25" font-weight="700" fill="#214763">learner</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="260" y="410" width="300" height="145" rx="24" fill="#ffffff"/>
    <text x="302" y="452" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="700" fill="#214763">constructed hypothesis</text>
    <circle cx="335" cy="510" r="23" fill="#4b9be1"/>
    <circle cx="410" cy="488" r="23" fill="url(#hypothesis)"/>
    <circle cx="485" cy="515" r="23" fill="#f4b84a"/>
    <path d="M358 503 C374 498 386 494 399 491" stroke="#1865ba" stroke-width="4" marker-end="url(#arrowBlue)" fill="none"/>
    <path d="M432 496 C449 503 462 508 474 512" stroke="#176f7e" stroke-width="4" marker-end="url(#arrowTeal)" fill="none"/>
    <path d="M473 532 C424 557 365 551 344 531" stroke="#c97824" stroke-width="4" marker-end="url(#arrowGold)" fill="none" stroke-dasharray="7 8"/>
    <text x="328" y="517" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">q</text>
    <text x="403" y="495" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">s</text>
    <text x="479" y="522" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">r</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="820" y="118" width="270" height="360" rx="28" fill="#d8dde3"/>
    <rect x="845" y="150" width="220" height="70" rx="16" fill="#eef1f4"/>
    <text x="880" y="181" font-family="Roboto, Arial, sans-serif" font-size="24" font-weight="700" fill="#334557">black-box</text>
    <text x="894" y="208" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#566675">pushdown system</text>
    <rect x="880" y="260" width="145" height="38" rx="8" fill="#f7f8f9"/>
    <rect x="880" y="310" width="145" height="38" rx="8" fill="#f7f8f9"/>
    <rect x="880" y="360" width="145" height="38" rx="8" fill="#f7f8f9"/>
    <path d="M910 279 h85 M910 329 h85 M910 379 h85" stroke="#66727e" stroke-width="5" stroke-linecap="round"/>
    <path d="M858 245 C932 232 1011 235 1049 252" fill="none" stroke="#aeb7c0" stroke-width="5" stroke-linecap="round"/>
    <path d="M858 420 C925 448 1005 446 1049 421" fill="none" stroke="#aeb7c0" stroke-width="5" stroke-linecap="round"/>
  </g>

  <path d="M815 178 C660 105 475 130 320 198" stroke="#1865ba" stroke-width="5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="465" y="122" font-family="Roboto, Arial, sans-serif" font-size="20" font-weight="700" fill="#1865ba">membership information</text>

  <path d="M815 287 C650 244 475 247 335 265" stroke="#176f7e" stroke-width="5" fill="none" marker-end="url(#arrowTeal)"/>
  <text x="505" y="238" font-family="Roboto, Arial, sans-serif" font-size="20" font-weight="700" fill="#176f7e">stack information</text>

  <path d="M815 386 C640 430 465 382 325 318" stroke="#c97824" stroke-width="5" fill="none" marker-end="url(#arrowGold)"/>
  <text x="482" y="430" font-family="Roboto, Arial, sans-serif" font-size="20" font-weight="700" fill="#c97824">equivalence information</text>

  <path d="M255 355 C285 392 310 412 345 430" stroke="#566b83" stroke-width="5" stroke-dasharray="8 9" fill="none" marker-end="url(#arrowGray)"/>
  <text x="95" y="508" font-family="Roboto, Arial, sans-serif" font-size="20" font-weight="700" fill="#566b83">model construction</text>

  <path d="M330 205 C475 160 655 164 805 210" stroke="#b2bfca" stroke-width="3" stroke-dasharray="9 10" fill="none" marker-end="url(#arrowGray)" opacity="0.72"/>
  <text x="475" y="180" font-family="Roboto, Arial, sans-serif" font-size="17" fill="#66727e">queries to the target</text>

  <g opacity="0.9">
    <rect x="95" y="82" width="245" height="52" rx="26" fill="#ffffff"/>
    <text x="129" y="116" font-family="Roboto, Arial, sans-serif" font-size="21" font-weight="700" fill="#214763">active learning loop</text>
    <rect x="725" y="520" width="295" height="52" rx="26" fill="#ffffff"/>
    <text x="759" y="554" font-family="Roboto, Arial, sans-serif" font-size="21" font-weight="700" fill="#566b83">teacher / target system</text>
  </g>
</svg>
